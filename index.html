<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        input {
            background: #000;
            color: #fff;
            border: 1px solid #333;
            padding: 16px;
            border-radius: 0;
            font-size: 16px;
            width: 100%;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #fff;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            background: #ccc;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .panel {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0 0 30px 0;
            text-align: center;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .toggle-row span {
            font-size: 16px;
            color: #fff;
        }

        .switch {
            width: 40px;
            height: 20px;
            background: #000;
            border: 1px solid #fff;
            position: relative;
        }

        .switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #fff;
            transition: 0.2s;
        }

        .switch.active {
            background: #fff;
        }

        .switch.active::after {
            left: 22px;
            background: #000;
        }

        .segmented {
            display: flex;
            border: 1px solid #333;
        }

        .seg-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            color: #888;
            background: #000;
            transition: 0.2s;
        }

        .seg-btn.active {
            background: #fff;
            color: #000;
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #333;
        }

        .kick-btn {
            width: 32px;
            height: 32px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 14px;
            transition: 0.2s;
            margin-left: 10px;
        }

        .kick-btn:hover {
            border-color: #ff3b30;
            color: #ff3b30;
        }

        .toggle-row.disabled {
            opacity: 0.3;
            pointer-events: none;
            cursor: not-allowed;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid #333;
            padding: 12px 24px;
            font-size: 16px;
            z-index: 1000;
            display: flex;
            gap: 20px;
            pointer-events: none;
        }

        .recenter {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .follow-btn {
            position: absolute;
            bottom: 30px;
            left: 20px;
            height: 50px;
            padding: 0 20px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            letter-spacing: 1px;
            gap: 10px;
        }

        .follow-btn.active {
            background: #fff;
            color: #000;
            border-color: #fff;
        }

        .leave-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 5000;
            cursor: pointer;
            transition: 0.2s;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            cursor: pointer;
            transition: 0.2s;
        }

        .leave-btn:hover,
        .settings-btn:hover {
            border-color: #fff;
        }

        .leaflet-tooltip.clean-tooltip {
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            border-radius: 0;
            padding: 6px 12px;
            font-size: 14px;
            box-shadow: none;
        }

        .leaflet-tooltip-top:before {
            display: none;
        }

        .leaflet-marker-icon {
            transition: transform 0.1s linear, left 0.1s linear, top 0.1s linear;
        }

        .no-transition .leaflet-marker-icon {
            transition: none !important;
        }

        .no-transition .leaflet-circle {
            transition: none !important;
        }

        .no-transition .leaflet-circle-internal {
            transition: none !important;
        }

        #game-over-overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 4000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        #game-over-overlay h1 {
            font-size: 32px;
            font-weight: bold;
            margin: 0 0 20px 0;
            text-align: center;
            color: #ff3b30;
        }

        #game-over-overlay p {
            font-size: 20px;
            color: #fff;
            text-align: center;
        }
    </style>
</head>

<body>

    <div id="leave-btn" class="leave-btn hidden" onclick="leaveGame()">✕</div>
    <div id="settings-btn" class="settings-btn hidden" onclick="toggleSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="square">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
            <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
        </svg>
    </div>

    <div id="login" class="overlay">
        <h1>Map</h1>
        <div style="width: 100%; max-width: 300px;">
            <input type="text" id="username" placeholder="Name" autocomplete="off">
            <div class="toggle-row" id="admin-toggle-row" onclick="toggleAdminLogin()" style="border: none;">
                <span>Host</span>
                <div class="switch" id="admin-switch"></div>
            </div>
            <button onclick="joinGame()">Join</button>
        </div>
    </div>

    <div id="admin-panel" class="panel hidden">
        <div style="max-width: 500px; margin: 0 auto; width: 100%;">
            <h1>Settings</h1>

            <div class="toggle-row" style="cursor: default;">
                <span>Main Time (mins)</span>
                <input type="number" id="game-time" value="60"
                    style="padding: 0; margin: 0; width: 60px; text-align: right; border: none; font-size: 16px;">
            </div>

            <div class="toggle-row" style="cursor: default;">
                <span>Runner Headstart (secs)</span>
                <input type="number" id="runner-time" value="120"
                    style="padding: 0; margin: 0; width: 60px; text-align: right; border: none; font-size: 16px;">
            </div>

            <div class="toggle-row" style="cursor: default; border: none; padding-bottom: 5px;">
                <span>Game Mode</span>
            </div>
            <div class="segmented" style="margin-bottom: 20px;">
                <div class="seg-btn active" onclick="setMode('normal')" id="mode-normal">Normal</div>
                <div class="seg-btn" onclick="setMode('ring')" id="mode-ring">Ring</div>
            </div>

            <div class="toggle-row" style="cursor: default; border: none; padding-bottom: 5px; margin-top: 10px;">
                <span>Markers</span>
            </div>
            <div class="segmented" style="margin-bottom: 30px;">
                <div class="seg-btn active" onclick="setRot(true)" id="rot-true">Arrow</div>
                <div class="seg-btn" onclick="setRot(false)" id="rot-false">Dot</div>
            </div>

            <div class="toggle-row" onclick="toggleVisibilitySetting()"
                style="border-top: 1px solid #333; margin-top: 10px;">
                <span>Runners see Hunters</span>
                <div class="switch active" id="visibility-switch"></div>
            </div>

            <div
                style="margin: 40px 0 10px 0; font-size: 14px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px;">
                Players</div>
            <div id="admin-players" style="margin-bottom: 40px;"></div>

            <button onclick="saveAdminSettings()">Save</button>
            <button id="panel-stop-btn" class="hidden" onclick="emitStop()"
                style="margin-top: 10px; background: #ff3b30; color: #fff; border: none;">Stop Game</button>
        </div>
    </div>

    <div id="admin-controls" class="hidden"
        style="position: absolute; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 1000; display: flex; gap: 10px;">
        <button id="main-start-btn" onclick="emitStart()"
            style="padding: 12px 24px; font-size: 18px; border-radius: 8px;">START</button>
    </div>

    <div id="hud" class="hud hidden">
        <div id="hud-team" style="color: #fff;">RUN</div>
        <div style="width: 1px; background: #333;"></div>
        <div id="hud-timer">00:00</div>
    </div>

    <div id="recenter" class="recenter hidden" onclick="recenterMap()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="square">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="2" />
        </svg>
    </div>

    <div id="follow-btn" class="follow-btn hidden" onclick="toggleFollow()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="square">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
            <circle cx="12" cy="12" r="3" />
        </svg>
        <span>FOLLOW</span>
    </div>

    <div id="game-over-overlay" class="overlay hidden">
        <h1>GAME OVER</h1>
        <p id="game-over-message"></p>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://willis-transported-placidly.ngrok-free.dev', { transports: ['websocket'] });
        let myUid = localStorage.getItem('tactical_uid') || Math.random().toString(36).substring(2, 15);
        localStorage.setItem('tactical_uid', myUid);

        socket.on('connect', () => {
            const saved = JSON.parse(localStorage.getItem('tactical_login') || '{}');
            if (saved.name) {
                socket.emit('join', { uid: myUid, name: saved.name, isAdmin: saved.isAdmin });
            }
        });

        let map, markers = {}, playerRole, playerTeam, gameSettings, activeRoute, activeRing = null, selectedUid = null;
        let centered = false, rotationEnabled = true, runnersSeeHuntersEnabled = true, gameMode = 'normal', isFollowing = false, localPlayers = {};
        let serverTimeOffset = 0;

        const saved = JSON.parse(localStorage.getItem('tactical_login') || '{}');
        if (saved.name) document.getElementById('username').value = saved.name;
        if (saved.isAdmin) document.getElementById('admin-switch').classList.add('active');

        let adminExistsLocally = false;
        function toggleAdminLogin() {
            if (adminExistsLocally) return;
            document.getElementById('admin-switch').classList.toggle('active');
        }

        function toggleVisibilitySetting() {
            runnersSeeHuntersEnabled = !runnersSeeHuntersEnabled;
            document.getElementById('visibility-switch').classList.toggle('active', runnersSeeHuntersEnabled);
        }

        socket.on('admin_status', (status) => {
            adminExistsLocally = status.exists;
            const row = document.getElementById('admin-toggle-row');
            const switchEl = document.getElementById('admin-switch');
            const saved = JSON.parse(localStorage.getItem('tactical_login') || '{}');

            if (adminExistsLocally && !saved.isAdmin) {
                row.classList.add('disabled');
                switchEl.classList.remove('active');
            } else {
                row.classList.remove('disabled');
            }
        });

        function setRot(val) {
            rotationEnabled = val;
            document.getElementById('rot-true').classList.toggle('active', val);
            document.getElementById('rot-false').classList.toggle('active', !val);
        }

        function joinGame() {
            const name = document.getElementById('username').value.trim();
            if (!name) return;

            if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().catch(console.error);
            }

            const isAdmin = document.getElementById('admin-switch').classList.contains('active');
            localStorage.setItem('tactical_login', JSON.stringify({ name, isAdmin }));
            socket.emit('join', { uid: myUid, name, isAdmin });
        }

        socket.on('joined', (data) => {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('leave-btn').classList.remove('hidden');
            playerRole = data.role;
            playerTeam = data.team;
            gameSettings = data.settings;
            runnersSeeHuntersEnabled = gameSettings.runnersSeeHunters;
            document.getElementById('hud-team').innerText = playerTeam === 'hunter' ? 'HUNTER' : 'RUNNER';

            if (playerRole === 'admin') {
                document.getElementById('settings-btn').classList.remove('hidden');
                document.getElementById('visibility-switch').classList.toggle('active', runnersSeeHuntersEnabled);
                document.getElementById('admin-controls').classList.remove('hidden');
                // Pre-populate settings inputs from server values
                document.getElementById('game-time').value = Math.round(gameSettings.winTime / 60);
                document.getElementById('runner-time').value = gameSettings.runnerTime;
                rotationEnabled = gameSettings.showRotation;
                gameMode = gameSettings.gameMode;
                setRot(rotationEnabled);
                setMode(gameMode);
                if (!gameSettings.gameActive) {
                    document.getElementById('main-start-btn').classList.remove('hidden');
                    document.getElementById('panel-stop-btn').classList.add('hidden');
                    document.getElementById('admin-panel').classList.remove('hidden');
                } else {
                    document.getElementById('main-start-btn').classList.add('hidden');
                    document.getElementById('panel-stop-btn').classList.remove('hidden');
                    document.getElementById('hud').classList.remove('hidden');
                    document.getElementById('recenter').classList.remove('hidden');
                }
            } else {
                if (gameSettings.gameActive) {
                    document.getElementById('hud').classList.remove('hidden');
                    document.getElementById('recenter').classList.remove('hidden');
                }
            }

            if (!map) {
                map = L.map('map', {
                    zoomControl: false,
                    attributionControl: false,
                    zoomAnimation: true,
                    fadeAnimation: true,
                    markerZoomAnimation: true,
                    maxZoom: 22
                }).setView([0, 0], 2);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                    maxNativeZoom: 19,
                    maxZoom: 22
                }).addTo(map);

                map.on('movestart zoomstart', () => document.getElementById('map').classList.add('no-transition'));
                map.on('moveend zoomend', () => document.getElementById('map').classList.remove('no-transition'));
                map.on('click', (e) => { if (e.originalEvent.target.id === 'map') deselect(); });
                map.on('dragstart', () => { if (isFollowing) toggleFollow(); });
            }
            startTracking();
        });

        let compassHeading = null;
        let ringExitTimer = null;
        let ringExitStartTime = null;
        function updateCompass(e) {
            let heading = 0;
            if (e.webkitCompassHeading !== undefined) {
                heading = e.webkitCompassHeading;
            } else if (e.absolute && e.alpha !== null) {
                heading = 360 - e.alpha;
            } else {
                return;
            }

            let orientation = 0;
            if (window.screen && window.screen.orientation && window.screen.orientation.angle !== undefined) {
                orientation = window.screen.orientation.angle;
            } else if (typeof window.orientation !== 'undefined') {
                orientation = window.orientation;
            }

            compassHeading = (heading + orientation) % 360;
        }

        let lastValidHeading = 0;
        function startTracking() {
            window.addEventListener('deviceorientation', updateCompass, true);
            window.addEventListener('deviceorientationabsolute', updateCompass, true);

            navigator.geolocation.watchPosition((pos) => {
                const { latitude: lat, longitude: lng, heading: gpsHeading } = pos.coords;
                window.lastPos = { lat, lng };

                let finalHeading = lastValidHeading;
                if (compassHeading !== null) {
                    finalHeading = compassHeading;
                } else if (gpsHeading !== null && gpsHeading !== undefined) {
                    finalHeading = gpsHeading;
                }

                lastValidHeading = finalHeading;
                if (!centered) { recenterMap(); centered = true; }
                socket.emit('loc', { uid: myUid, lat, lng, heading: finalHeading });
            }, () => { }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        }

        function recenterMap() {
            if (window.lastPos && map) map.setView([window.lastPos.lat, window.lastPos.lng], 17);
        }

        function setMode(val) {
            gameMode = val;
            document.getElementById('mode-ring').classList.toggle('active', val === 'ring');
            document.getElementById('mode-normal').classList.toggle('active', val === 'normal');
        }

        function saveAdminSettings() {
            const timeMin = parseInt(document.getElementById('game-time').value) || 60;
            const runnerSec = parseInt(document.getElementById('runner-time').value) || 120;
            socket.emit('save_settings', {
                winTime: timeMin * 60,
                runnerTime: runnerSec,
                showRotation: rotationEnabled,
                runnersSeeHunters: runnersSeeHuntersEnabled,
                gameMode: gameMode
            });
            document.getElementById('admin-panel').classList.add('hidden');
        }

        function emitStart() {
            socket.emit('start_game');
        }

        function emitStop() {
            if (confirm('Stop the game?')) {
                socket.emit('stop_game');
            }
        }

        function toggleSettings() {
            document.getElementById('admin-panel').classList.toggle('hidden');
        }

        function leaveGame() {
            localStorage.removeItem('tactical_login');
            location.reload();
        }

        socket.on('settings_updated', (settings) => {
            gameSettings = settings;
            if (gameSettings.gameActive) {
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('recenter').classList.remove('hidden');
            }
            if (playerRole === 'admin') {
                document.getElementById('admin-controls').classList.toggle('hidden', gameSettings.gameActive);
                document.getElementById('main-start-btn').classList.toggle('hidden', gameSettings.gameActive);
                document.getElementById('panel-stop-btn').classList.toggle('hidden', !gameSettings.gameActive);
            }
        });

        socket.on('game_started', (settings) => {
            gameSettings = settings;
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('recenter').classList.remove('hidden');
            document.getElementById('game-over-overlay').classList.add('hidden');
            ringExitStartTime = null;
            ringExitTimer = null;
            if (playerRole === 'admin') {
                document.getElementById('admin-controls').classList.add('hidden');
                document.getElementById('main-start-btn').classList.add('hidden');
                document.getElementById('panel-stop-btn').classList.remove('hidden');
            }
            if (activeRoute) { map.removeLayer(activeRoute); activeRoute = null; }
            setTimeout(() => { if (map) map.invalidateSize(); }, 100);
        });

        socket.on('game_stopped', (settings) => {
            gameSettings = settings;
            document.getElementById('hud').classList.add('hidden');
            document.getElementById('recenter').classList.add('hidden');
            document.getElementById('game-over-overlay').classList.add('hidden');
            ringExitStartTime = null;
            ringExitTimer = null;
            if (playerRole === 'admin') {
                document.getElementById('admin-controls').classList.remove('hidden');
                document.getElementById('main-start-btn').classList.remove('hidden');
                document.getElementById('panel-stop-btn').classList.add('hidden');
            }
            if (activeRing) { map.removeLayer(activeRing); activeRing = null; }
        });

        const createIcon = (color, heading, showRot) => {
            const svg = showRot
                ? `<svg viewBox="0 0 24 24" style="width: 28px; height: 28px;"><path d="M12 2L22 20L12 16L2 20Z" fill="${color}"/></svg>`
                : `<svg viewBox="0 0 24 24" style="width: 20px; height: 20px;"><circle cx="12" cy="12" r="10" fill="${color}"/></svg>`;
            return L.divIcon({
                className: 'marker-container',
                html: `<div style="transform: rotate(${showRot ? heading : 0}deg); transition: transform 0.1s linear; display: flex; justify-content: center; align-items: center; width: 100%; height: 100%;">${svg}</div>`,
                iconSize: showRot ? [28, 28] : [20, 20],
                iconAnchor: showRot ? [14, 14] : [10, 10]
            });
        };

        socket.on('upd', (data) => {
            const { players: pData, settings: sData, serverTime } = data;
            if (serverTime) {
                serverTimeOffset = serverTime - Date.now();
            }
            gameSettings = sData;
            localPlayers = pData;

            const isRunner = playerTeam === 'runner';
            const shouldHideHunters = isRunner && !sData.runnersSeeHunters;

            for (let id in markers) {
                if (!pData[id] || (shouldHideHunters && pData[id].team === 'hunter')) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            }

            if (gameSettings.gameActive && gameSettings.gameMode === 'ring') {
                const currentSyncedTime = Date.now() + serverTimeOffset;
                const elapsed = (currentSyncedTime - gameSettings.startTime) / 1000;
                if (elapsed >= gameSettings.runnerTime && gameSettings.ringRadius > 0) {
                    if (!activeRing && gameSettings.ringLat) {
                        activeRing = L.circle([gameSettings.ringLat, gameSettings.ringLng], {
                            color: '#ffffff',
                            weight: 3,
                            fill: false,
                            interactive: false,
                            radius: gameSettings.ringRadius
                        }).addTo(map);
                    } else if (activeRing) {
                        activeRing.setRadius(gameSettings.ringRadius);
                    }

                    if (isRunner && pData[myUid] && gameSettings.ringLat) {
                        const myPos = pData[myUid];
                        const ringCenter = L.latLng(gameSettings.ringLat, gameSettings.ringLng);
                        const myLatLng = L.latLng(myPos.lat, myPos.lng);
                        const distance = ringCenter.distanceTo(myLatLng);
                        const isOutside = distance > gameSettings.ringRadius;

                        if (isOutside) {
                            if (!ringExitStartTime) {
                                ringExitStartTime = Date.now();
                            }
                            const timeOutside = Date.now() - ringExitStartTime;
                            if (activeRing) {
                                activeRing.setStyle({ color: '#ff3b30' });
                            }
                            if (timeOutside >= 10000 && !ringExitTimer) {
                                ringExitTimer = true;
                                socket.emit('ring_exit_stop');
                                const overlay = document.getElementById('game-over-overlay');
                                document.getElementById('game-over-message').innerText = myPos.name + " outside of ring";
                                overlay.classList.remove('hidden');
                                setTimeout(() => {
                                    overlay.classList.add('hidden');
                                    ringExitStartTime = null;
                                    ringExitTimer = null;
                                }, 10000);
                            }
                        } else {
                            if (ringExitStartTime || ringExitTimer) {
                                ringExitStartTime = null;
                                ringExitTimer = null;
                            }
                            if (activeRing) {
                                activeRing.setStyle({ color: '#ffffff' });
                            }
                        }
                    }
                } else {
                    if (activeRing) { map.removeLayer(activeRing); activeRing = null; }
                    ringExitStartTime = null;
                    ringExitTimer = null;
                }
            } else {
                if (activeRing) { map.removeLayer(activeRing); activeRing = null; }
                ringExitStartTime = null;
                ringExitTimer = null;
            }

            const showRot = gameSettings.showRotation;
            for (let id in pData) {
                const p = pData[id];
                if (shouldHideHunters && p.team === 'hunter') continue;

                const pos = [p.lat, p.lng];
                if (markers[id]) {
                    markers[id].setLatLng(pos);
                    if (markers[id].lastShowRot !== showRot) {
                        markers[id].setIcon(createIcon(p.color, p.heading, showRot));
                        markers[id].lastShowRot = showRot;
                    } else {
                        const el = markers[id].getElement();
                        if (el) {
                            const div = el.querySelector('div');
                            if (div) {
                                div.style.transform = `rotate(${showRot ? p.heading : 0}deg)`;
                            }
                        }
                    }
                } else {
                    markers[id] = L.marker(pos, { icon: createIcon(p.color, p.heading, showRot) }).addTo(map);
                    markers[id].lastShowRot = showRot;
                    markers[id].on('click', () => handleMarkerClick(id, p));
                }

                if (selectedUid === id) {
                    if (activeRoute) {
                        const latlngs = activeRoute.getLatLngs();
                        const lastLatLng = latlngs.length > 0 ? latlngs[latlngs.length - 1] : null;
                        if (!lastLatLng || lastLatLng.lat !== pos[0] || lastLatLng.lng !== pos[1]) {
                            activeRoute.addLatLng(pos);
                        }
                    }
                    if (isFollowing) map.panTo(pos);
                }
            }
        });

        function handleMarkerClick(id, p) {
            if (selectedUid === id) {
                deselect();
            } else {
                deselect();
                selectedUid = id;
                document.getElementById('follow-btn').classList.remove('hidden');
                markers[id].bindTooltip(p.name, { permanent: true, direction: 'top', className: 'clean-tooltip', offset: [0, -10] }).openTooltip();
                socket.emit('req_route', id);
            }
        }

        function toggleFollow() {
            isFollowing = !isFollowing;
            document.getElementById('follow-btn').classList.toggle('active', isFollowing);
            if (isFollowing && selectedUid && localPlayers[selectedUid]) {
                const p = localPlayers[selectedUid];
                map.setView([p.lat, p.lng], 20);
            }
        }

        function deselect() {
            if (selectedUid && markers[selectedUid]) {
                markers[selectedUid].closeTooltip();
                markers[selectedUid].unbindTooltip();
            }
            selectedUid = null;
            isFollowing = false;
            document.getElementById('follow-btn').classList.add('hidden');
            document.getElementById('follow-btn').classList.remove('active');
            if (activeRoute) { map.removeLayer(activeRoute); activeRoute = null; }
        }

        socket.on('route_data', (data) => {
            if (selectedUid !== data.uid) return;
            if (activeRoute) map.removeLayer(activeRoute);
            const latlngs = data.route.map(r => [r.lat, r.lng]);
            const color = (localPlayers[data.uid] && localPlayers[data.uid].color) || '#ffffff';
            activeRoute = L.polyline(latlngs, { color, weight: 4, opacity: 1 }).addTo(map);
        });

        socket.on('player_list', (list) => {
            if (playerRole !== 'admin') return;
            const cont = document.getElementById('admin-players');
            cont.innerHTML = '';
            Object.values(list).forEach(p => {
                cont.innerHTML += `
                    <div class="player-row">
                        <div style="display:flex; align-items:center; gap:12px; font-size:16px; flex: 1;">
                            <div style="width:12px; height:12px; background:${p.color};"></div>
                            ${p.name}
                        </div>
                        <div style="display:flex; align-items:center;">
                            <div class="segmented" style="width: 140px; margin: 0;">
                                <div class="seg-btn ${p.team === 'runner' ? 'active' : ''}" onclick="changeTeam('${p.uid}', 'runner')">Runner</div>
                                <div class="seg-btn ${p.team === 'hunter' ? 'active' : ''}" onclick="changeTeam('${p.uid}', 'hunter')">Hunter</div>
                            </div>
                            ${p.role !== 'admin' ? `<div class="kick-btn" onclick="kickPlayer('${p.uid}')">✕</div>` : ''}
                        </div>
                    </div>`;
            });
        });

        function kickPlayer(uid) { if (confirm('Kick player?')) socket.emit('kick', uid); }
        function changeTeam(uid, team) { socket.emit('change_team', { targetUid: uid, newTeam: team }); }
        socket.on('team_moved', (n) => { playerTeam = n; document.getElementById('hud-team').innerText = n === 'hunter' ? 'HUNTER' : 'RUNNER'; });
        socket.on('kicked', () => {
            localStorage.removeItem('tactical_login');
            location.reload();
        });

        setInterval(() => {
            if (!gameSettings || !gameSettings.startTime || !gameSettings.gameActive) {
                document.getElementById('hud-timer').innerText = "00:00";
                return;
            }
            const currentSyncedTime = Date.now() + serverTimeOffset;
            const elapsed = (currentSyncedTime - gameSettings.startTime) / 1000;
            let remaining = 0;

            if (elapsed < gameSettings.runnerTime) {
                remaining = Math.max(0, gameSettings.runnerTime - elapsed);
            } else {
                remaining = Math.max(0, gameSettings.winTime - (elapsed - gameSettings.runnerTime));
            }

            const m = Math.floor(remaining / 60);
            const s = Math.floor(remaining % 60).toString().padStart(2, '0');
            document.getElementById('hud-timer').innerText = `${m}:${s}`;
        }, 1000);
    </script>
</body>

</html>
