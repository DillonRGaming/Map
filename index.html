<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Map</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        * {
            box-sizing: border-box;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            user-select: none;
        }

        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            color: #fff;
            overflow: hidden;
        }

        #map {
            width: 100vw;
            height: 100vh;
            background: #000;
        }

        input {
            background: #000;
            color: #fff;
            border: 1px solid #333;
            padding: 16px;
            border-radius: 0;
            font-size: 16px;
            width: 100%;
            outline: none;
            margin-bottom: 20px;
            transition: border-color 0.2s;
        }

        input:focus {
            border-color: #fff;
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 0;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
        }

        button:active {
            background: #ccc;
        }

        .overlay {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .panel {
            position: fixed;
            inset: 0;
            background: #000;
            z-index: 2000;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .hidden {
            display: none !important;
        }

        h1 {
            font-size: 24px;
            font-weight: normal;
            margin: 0 0 30px 0;
            text-align: center;
        }

        .toggle-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-bottom: 1px solid #333;
            margin-bottom: 20px;
            cursor: pointer;
        }

        .toggle-row span {
            font-size: 16px;
            color: #fff;
        }

        .switch {
            width: 40px;
            height: 20px;
            background: #000;
            border: 1px solid #fff;
            position: relative;
        }

        .switch::after {
            content: '';
            position: absolute;
            top: 2px;
            left: 2px;
            width: 14px;
            height: 14px;
            background: #fff;
            transition: 0.2s;
        }

        .switch.active {
            background: #fff;
        }

        .switch.active::after {
            left: 22px;
            background: #000;
        }

        .segmented {
            display: flex;
            border: 1px solid #333;
        }

        .seg-btn {
            flex: 1;
            text-align: center;
            padding: 10px;
            font-size: 14px;
            cursor: pointer;
            color: #888;
            background: #000;
            transition: 0.2s;
        }

        .seg-btn.active {
            background: #fff;
            color: #000;
        }

        .player-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 0;
            border-bottom: 1px solid #333;
        }

        .kick-btn {
            color: #888;
            cursor: pointer;
            padding: 8px;
            font-size: 14px;
            transition: 0.2s;
        }

        .kick-btn:hover {
            color: #ff3b30;
        }

        .hud {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 1px solid #333;
            padding: 12px 24px;
            font-size: 16px;
            z-index: 1000;
            display: flex;
            gap: 20px;
            pointer-events: none;
        }

        .recenter {
            position: absolute;
            bottom: 30px;
            right: 20px;
            width: 50px;
            height: 50px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            cursor: pointer;
        }

        .leave-btn {
            position: absolute;
            top: 20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            z-index: 5000;
            cursor: pointer;
            transition: 0.2s;
        }

        .settings-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            width: 40px;
            height: 40px;
            background: #000;
            border: 1px solid #333;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 5000;
            cursor: pointer;
            transition: 0.2s;
        }

        .leave-btn:hover,
        .settings-btn:hover {
            border-color: #fff;
        }

        .leaflet-tooltip.clean-tooltip {
            background: #000;
            border: 1px solid #fff;
            color: #fff;
            border-radius: 0;
            padding: 6px 12px;
            font-size: 14px;
            box-shadow: none;
        }

        .leaflet-tooltip-top:before {
            display: none;
        }

        .leaflet-marker-icon {
            transition: transform 0.1s linear, left 0.1s linear, top 0.1s linear;
        }
    </style>
</head>

<body>

    <div id="leave-btn" class="leave-btn hidden" onclick="leaveGame()">✕</div>
    <div id="settings-btn" class="settings-btn hidden" onclick="toggleSettings()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="square">
            <path d="M12 15a3 3 0 100-6 3 3 0 000 6z" />
            <path
                d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-2 2 2 2 0 01-2-2v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83 0 2 2 0 010-2.83l.06-.06a1.65 1.65 0 00.33-1.82 1.65 1.65 0 00-1.51-1H3a2 2 0 01-2-2 2 2 0 012-2h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 010-2.83 2 2 0 012.83 0l.06.06a1.65 1.65 0 001.82.33H9a1.65 1.65 0 001-1.51V3a2 2 0 012-2 2 2 0 012 2v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 0 2 2 0 010 2.83l-.06.06a1.65 1.65 0 00-.33 1.82V9a1.65 1.65 0 001.51 1H21a2 2 0 012 2 2 2 0 01-2 2h-.09a1.65 1.65 0 00-1.51 1z" />
        </svg>
    </div>

    <div id="login" class="overlay">
        <h1>Map</h1>
        <div style="width: 100%; max-width: 300px;">
            <input type="text" id="username" placeholder="Name" autocomplete="off">
            <div class="toggle-row" onclick="toggleAdminLogin()" style="border: none;">
                <span>Host</span>
                <div class="switch" id="admin-switch"></div>
            </div>
            <button onclick="joinGame()">Join</button>
        </div>
    </div>

    <div id="admin-panel" class="panel hidden">
        <div style="max-width: 500px; margin: 0 auto; width: 100%;">
            <h1>Settings</h1>

            <div class="toggle-row" style="cursor: default;">
                <span>Time (mins)</span>
                <input type="number" id="game-time" value="60"
                    style="padding: 0; margin: 0; width: 60px; text-align: right; border: none; font-size: 16px;">
            </div>

            <div class="toggle-row" style="cursor: default; border: none; padding-bottom: 5px;">
                <span>Markers</span>
            </div>
            <div class="segmented" style="margin-bottom: 30px;">
                <div class="seg-btn active" onclick="setRot(true)" id="rot-true">Arrow</div>
                <div class="seg-btn" onclick="setRot(false)" id="rot-false">Dot</div>
            </div>

            <div
                style="margin: 40px 0 10px 0; font-size: 14px; color: #fff; border-bottom: 1px solid #333; padding-bottom: 10px;">
                Players</div>
            <div id="admin-players" style="margin-bottom: 40px;"></div>

            <button onclick="startGame()">Start</button>
        </div>
    </div>

    <div id="hud" class="hud hidden">
        <div id="hud-team" style="color: #fff;">RUN</div>
        <div style="width: 1px; background: #333;"></div>
        <div id="hud-timer">00:00</div>
    </div>

    <div id="recenter" class="recenter hidden" onclick="recenterMap()">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
            stroke-linecap="square">
            <circle cx="12" cy="12" r="10" />
            <circle cx="12" cy="12" r="2" />
        </svg>
    </div>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        const socket = io('https://willis-transported-placidly.ngrok-free.dev', { transports: ['websocket'] });
        let myUid = localStorage.getItem('tactical_uid') || Math.random().toString(36).substring(2, 15);
        localStorage.setItem('tactical_uid', myUid);

        socket.on('connect', () => {
            const saved = JSON.parse(localStorage.getItem('tactical_login') || '{}');
            if (saved.name) {
                socket.emit('join', { uid: myUid, name: saved.name, isAdmin: saved.isAdmin });
            }
        });

        let map, markers = {}, playerRole, playerTeam, gameSettings, activeRoute, selectedUid = null;
        let centered = false, rotationEnabled = true, localPlayers = {};

        const saved = JSON.parse(localStorage.getItem('tactical_login') || '{}');
        if (saved.name) document.getElementById('username').value = saved.name;
        if (saved.isAdmin) document.getElementById('admin-switch').classList.add('active');

        function toggleAdminLogin() {
            document.getElementById('admin-switch').classList.toggle('active');
        }

        function setRot(val) {
            rotationEnabled = val;
            document.getElementById('rot-true').classList.toggle('active', val);
            document.getElementById('rot-false').classList.toggle('active', !val);
        }

        function joinGame() {
            const name = document.getElementById('username').value.trim();
            if (!name) return;
            const isAdmin = document.getElementById('admin-switch').classList.contains('active');
            localStorage.setItem('tactical_login', JSON.stringify({ name, isAdmin }));
            socket.emit('join', { uid: myUid, name, isAdmin });
        }

        socket.on('joined', (data) => {
            document.getElementById('login').classList.add('hidden');
            document.getElementById('leave-btn').classList.remove('hidden');
            playerRole = data.role;
            playerTeam = data.team;
            gameSettings = data.settings;
            document.getElementById('hud-team').innerText = playerTeam === 'hunter' ? 'HUNTER' : 'RUNNER';

            if (playerRole === 'admin') {
                document.getElementById('settings-btn').classList.remove('hidden');
                if (!gameSettings.gameActive) {
                    document.getElementById('admin-panel').classList.remove('hidden');
                } else {
                    document.getElementById('hud').classList.remove('hidden');
                    document.getElementById('recenter').classList.remove('hidden');
                }
            } else {
                document.getElementById('hud').classList.remove('hidden');
                document.getElementById('recenter').classList.remove('hidden');
            }

            if (!map) {
                map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
                L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}').addTo(map);
            }
            startTracking();
        });

        function startTracking() {
            navigator.geolocation.watchPosition((pos) => {
                const { latitude: lat, longitude: lng, heading } = pos.coords;
                window.lastPos = { lat, lng };
                if (!centered) { recenterMap(); centered = true; }
                socket.emit('loc', { uid: myUid, lat, lng, heading });
            }, () => { }, { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 });
        }

        function recenterMap() {
            if (window.lastPos && map) map.setView([window.lastPos.lat, window.lastPos.lng], 17);
        }

        function startGame() {
            const timeMin = parseInt(document.getElementById('game-time').value) || 60;
            socket.emit('start_game', { winTime: timeMin * 60, showRotation: rotationEnabled });
        }

        function toggleSettings() {
            document.getElementById('admin-panel').classList.toggle('hidden');
        }

        function leaveGame() {
            localStorage.removeItem('tactical_login');
            location.reload();
        }

        socket.on('game_started', (settings) => {
            gameSettings = settings;
            document.getElementById('admin-panel').classList.add('hidden');
            document.getElementById('hud').classList.remove('hidden');
            document.getElementById('recenter').classList.remove('hidden');
            if (activeRoute) { map.removeLayer(activeRoute); activeRoute = null; }
            setTimeout(() => { if (map) map.invalidateSize(); }, 100);
        });

        const createIcon = (color, heading, showRot) => {
            const svg = showRot
                ? `<svg viewBox="0 0 24 24" style="transform: rotate(${heading}deg); width: 28px; height: 28px;"><path d="M12 2L22 20L12 16L2 20Z" fill="${color}"/></svg>`
                : `<svg viewBox="0 0 24 24" style="width: 20px; height: 20px;"><circle cx="12" cy="12" r="10" fill="${color}"/></svg>`;
            return L.divIcon({ className: '', html: svg, iconSize: showRot ? [28, 28] : [20, 20], iconAnchor: showRot ? [14, 14] : [10, 10] });
        };

        socket.on('upd', (data) => {
            const { players: pData, settings: sData } = data;
            gameSettings = sData;
            localPlayers = pData;

            for (let id in markers) {
                if (!pData[id]) { map.removeLayer(markers[id]); delete markers[id]; }
            }
            for (let id in pData) {
                const p = pData[id];
                const pos = [p.lat, p.lng];
                if (markers[id]) {
                    markers[id].setLatLng(pos);
                    markers[id].setIcon(createIcon(p.color, p.heading, gameSettings.showRotation));
                } else {
                    markers[id] = L.marker(pos, { icon: createIcon(p.color, p.heading, gameSettings.showRotation) }).addTo(map);
                    markers[id].on('click', () => handleMarkerClick(id, p));
                }

                if (selectedUid === id && activeRoute) activeRoute.addLatLng(pos);
            }
        });

        function handleMarkerClick(id, p) {
            if (selectedUid === id) {
                selectedUid = null;
                if (activeRoute) { map.removeLayer(activeRoute); activeRoute = null; }
                markers[id].unbindTooltip();
            } else {
                if (selectedUid && markers[selectedUid]) markers[selectedUid].unbindTooltip();
                selectedUid = id;
                markers[id].bindTooltip(p.name, { permanent: true, direction: 'top', className: 'clean-tooltip', offset: [0, -10] }).openTooltip();
                socket.emit('req_route', id);
            }
        }

        socket.on('route_data', (data) => {
            if (selectedUid !== data.uid) return;
            if (activeRoute) map.removeLayer(activeRoute);
            const latlngs = data.route.map(r => [r.lat, r.lng]);
            activeRoute = L.polyline(latlngs, { color: localPlayers[data.uid].color, weight: 4, opacity: 1 }).addTo(map);
        });

        socket.on('player_list', (list) => {
            if (playerRole !== 'admin') return;
            const cont = document.getElementById('admin-players');
            cont.innerHTML = '';
            Object.values(list).forEach(p => {
                cont.innerHTML += `
                    <div class="player-row">
                        <div style="display:flex; align-items:center; gap:12px; font-size:16px; flex: 1;">
                            <div style="width:12px; height:12px; background:${p.color};"></div>
                            ${p.name}
                            ${p.role !== 'admin' ? `<span class="kick-btn" onclick="kickPlayer('${p.uid}')">✕</span>` : ''}
                        </div>
                        <div class="segmented" style="width: 140px; margin: 0;">
                            <div class="seg-btn ${p.team === 'runner' ? 'active' : ''}" onclick="changeTeam('${p.uid}', 'runner')">Runner</div>
                            <div class="seg-btn ${p.team === 'hunter' ? 'active' : ''}" onclick="changeTeam('${p.uid}', 'hunter')">Hunter</div>
                        </div>
                    </div>`;
            });
        });

        function kickPlayer(uid) { if (confirm('Kick player?')) socket.emit('kick', uid); }
        function changeTeam(uid, team) { socket.emit('change_team', { targetUid: uid, newTeam: team }); }
        socket.on('team_moved', (n) => { playerTeam = n; document.getElementById('hud-team').innerText = n === 'hunter' ? 'HUNTER' : 'RUNNER'; });
        socket.on('kicked', () => {
            localStorage.removeItem('tactical_login');
            location.reload();
        });

        setInterval(() => {
            if (!gameSettings || !gameSettings.startTime) return;
            const elapsed = (Date.now() - gameSettings.startTime) / 1000;
            const remaining = Math.max(0, gameSettings.winTime - elapsed);
            const m = Math.floor(remaining / 60);
            const s = Math.floor(remaining % 60).toString().padStart(2, '0');
            document.getElementById('hud-timer').innerText = `${m}:${s}`;
        }, 1000);
    </script>
</body>

</html>
