<!DOCTYPE html>
<html>
<head>
    <title>Map</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        #map { width: 100vw; height: 100vh; }
    </style>
</head>
<body>
    <div id="map"></div>
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        if (!localStorage.getItem('uid')) {
            localStorage.setItem('uid', Math.random().toString(36).substring(2, 15));
            localStorage.setItem('clr', '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'));
        }
        const uid = localStorage.getItem('uid');
        const clr = localStorage.getItem('clr');
        
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([0, 0], 2);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);
        
        const socket = io('https://willis-transported-placidly.ngrok-free.dev');
        const markers = {};

        const customIcon = (color) => L.divIcon({
            className: 'custom-icon',
            html: `<div style="background-color:${color};width:14px;height:14px;border-radius:50%;border:2px solid white;box-shadow:0 0 4px rgba(0,0,0,0.5);"></div>`,
            iconSize: [18, 18],
            iconAnchor: [9, 9]
        });

        let centered = false;

        navigator.geolocation.watchPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lng = pos.coords.longitude;
                if (!centered) {
                    map.setView([lat, lng], 15);
                    centered = true;
                }
                socket.emit('loc', { uid, lat, lng, clr });
            },
            () => {},
            { enableHighAccuracy: true, maximumAge: 0, timeout: 5000 }
        );

        socket.on('upd', (users) => {
            for (let id in markers) {
                if (!users[id]) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            }
            for (let id in users) {
                const u = users[id];
                if (markers[id]) {
                    markers[id].setLatLng([u.lat, u.lng]);
                } else {
                    markers[id] = L.marker([u.lat, u.lng], { icon: customIcon(u.clr) }).addTo(map);
                }
            }
        });
    </script>
</body>
</html>
