<!DOCTYPE html>
<html>

<head>
    <title>Map</title>
    <link rel="icon" href="data:,">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body,
        html {
            margin: 0;
            padding: 0;
            height: 100%;
            background: #000;
            overflow: hidden;
        }

        #map {
            width: 100vw;
            height: 100vh;
        }


        #overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: #000;
            z-index: 9999;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            color: #fff;
            font-size: 40px;
            cursor: pointer;
            font-family: sans-serif;
            line-height: 1;
            padding: 20px;
        }

        #arrow {
            width: 150px;
            height: 150px;
        }

        #dist {
            color: #fff;
            font-family: sans-serif;
            margin-top: 40px;
            font-size: 36px;
            font-weight: bold;
        }
    </style>
</head>

<body>
    <div id="map"></div>
    <div id="overlay">
        <div id="close-btn" onclick="closeOverlay()">×</div>
        <img id="arrow" src="assets/arrow.png">
        <div id="dist"></div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
    <script>
        if (!localStorage.getItem('uid')) {
            localStorage.setItem('uid', Math.random().toString(36).substring(2, 15));
            localStorage.setItem('clr', '#' + Math.floor(Math.random() * 16777215).toString(16).padStart(6, '0'));
        }
        const uid = localStorage.getItem('uid');
        const clr = localStorage.getItem('clr');

        const map = L.map('map', { zoomControl: false, attributionControl: false, maxZoom: 24 }).setView([0, 0], 2);
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
            maxZoom: 24,
            maxNativeZoom: 18
        }).addTo(map);

        const socket = io('https://willis-transported-placidly.ngrok-free.dev', {
            transports: ['websocket'],
            upgrade: false
        });

        const markers = {};
        let usersData = {};
        let centered = false;
        let lastLat = null;
        let lastLng = null;
        let targetId = null;
        let heading = 0;
        let currentRot = 0;

        const customIcon = (color) => L.divIcon({
            className: 'custom-icon',
            html: `<div style="background-color:${color};width:34px;height:34px;border-radius:50%;box-shadow:0 0 10px rgba(0,0,0,1);"></div>`,
            iconSize: [34, 34],
            iconAnchor: [17, 17]
        });

        const handleOrientation = (e) => {
            let h = 0;
            if (e.webkitCompassHeading) {
                h = e.webkitCompassHeading;
            } else if (e.alpha !== null) {
                h = 360 - e.alpha;
            }
            heading = h;
        };

        let lastUpdate = 0;
        const animate = (time) => {
            if (targetId && usersData[targetId] && lastLat !== null && lastLng !== null) {
                const t = usersData[targetId];
                const r1 = lastLat * Math.PI / 180;
                const r2 = t.lat * Math.PI / 180;
                const dl = (t.lng - lastLng) * Math.PI / 180;

                const y = Math.sin(dl) * Math.cos(r2);
                const x = Math.cos(r1) * Math.sin(r2) - Math.sin(r1) * Math.cos(r2) * Math.cos(dl);
                const bearing = (Math.atan2(y, x) * 180 / Math.PI + 360) % 360;

                let targetRot = (bearing - heading + 360) % 360;
                let diff = (targetRot - currentRot) % 360;

                if (diff > 180) diff -= 360;
                else if (diff < -180) diff += 360;

                // Smoothing factor: higher = faster, lower = smoother
                currentRot += diff * 0.15;

                document.getElementById('arrow').style.transform = `rotate(${currentRot}deg)`;

                const a = Math.sin((r2 - r1) / 2) ** 2 + Math.cos(r1) * Math.cos(r2) * Math.sin(dl / 2) ** 2;
                const d = 6371000 * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
                document.getElementById('dist').innerText = Math.round(d * 3.28084) + " ft";
            }
            requestAnimationFrame(animate);
        };
        requestAnimationFrame(animate);

        const updateCompass = () => {
            // Logic moved to animate loop for smoothness
        };

        const closeOverlay = () => {
            targetId = null;
            document.getElementById('overlay').style.display = 'none';
            window.removeEventListener('deviceorientationabsolute', handleOrientation);
            window.removeEventListener('deviceorientation', handleOrientation);
        };

        socket.on('connect', () => {
            if (lastLat !== null && lastLng !== null) {
                socket.emit('loc', { uid, lat: lastLat, lng: lastLng, clr });
            }
        });

        const updateLoc = (pos) => {
            lastLat = pos.coords.latitude;
            lastLng = pos.coords.longitude;

            if (!centered) {
                map.setView([lastLat, lastLng], 18);
                centered = true;
            }
            socket.emit('loc', { uid, lat: lastLat, lng: lastLng, clr });
            if (targetId) updateCompass();
        };

        navigator.geolocation.getCurrentPosition(updateLoc, () => { }, { enableHighAccuracy: true });
        navigator.geolocation.watchPosition(updateLoc, () => { }, { enableHighAccuracy: true, maximumAge: 0, timeout: 2000 });

        socket.on('upd', (users) => {
            usersData = users;
            if (targetId && !usersData[targetId]) closeOverlay();

            for (let id in markers) {
                if (!users[id]) {
                    map.removeLayer(markers[id]);
                    delete markers[id];
                }
            }
            for (let id in users) {
                const u = users[id];
                if (markers[id]) {
                    markers[id].setLatLng([u.lat, u.lng]);
                } else {
                    markers[id] = L.marker([u.lat, u.lng], { icon: customIcon(u.clr) }).addTo(map);
                    markers[id].on('click', async () => {
                        if (id === uid) return;
                        targetId = id;
                        document.getElementById('overlay').style.display = 'flex';

                        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
                            try {
                                const perm = await DeviceOrientationEvent.requestPermission();
                                if (perm === 'granted') {
                                    window.addEventListener('deviceorientation', handleOrientation);
                                }
                            } catch (err) { }
                        } else {
                            window.addEventListener('deviceorientationabsolute', handleOrientation);
                            window.addEventListener('deviceorientation', handleOrientation);
                        }
                        updateCompass();
                    });
                }
            }
            if (targetId) updateCompass();
        });
    </script>
</body>

</html>
